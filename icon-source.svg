<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#F8F8F6"/>

  <!-- Card shadow -->
  <rect x="116" y="130" width="280" height="290" rx="28" fill="#000" opacity="0.06" transform="rotate(8 256 256)"/>

  <!-- Card body (tilted) -->
  <g transform="rotate(8 256 256)">
    <!-- Card base -->
    <rect x="112" y="124" width="288" height="292" rx="30" fill="#FFFFFF" stroke="#D8D8D2" stroke-width="2.5"/>

    <!-- Terminal screen -->
    <rect x="140" y="152" width="232" height="156" rx="16" fill="#1F2937"/>

    <!-- Terminal title bar dots -->
    <circle cx="160" cy="172" r="5.5" fill="#FF5F56"/>
    <circle cx="180" cy="172" r="5.5" fill="#FFBD2E"/>
    <circle cx="200" cy="172" r="5.5" fill="#27C93F"/>

    <!-- Prompt >_ -->
    <text x="160" y="252" font-family="SF Mono, Menlo, Consolas, monospace" font-size="46" font-weight="700" fill="#27C93F">&gt;</text>
    <rect x="200" y="226" width="56" height="8" rx="4" fill="#E5E7EB"/>
    <rect x="266" y="226" width="34" height="8" rx="4" fill="#27C93F" opacity="0.55"/>

    <!-- Cursor -->
    <rect x="312" y="222" width="12" height="36" rx="3" fill="#27C93F">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <!-- Channel dots -->
    <g transform="translate(0,0)">
      <circle cx="196" cy="360" r="11" fill="#34D399"/>
      <circle cx="256" cy="360" r="11" fill="#60A5FA"/>
      <circle cx="316" cy="360" r="11" fill="#9CA3AF"/>
    </g>

    <!-- Card bottom label bar -->
    <rect x="172" y="380" width="168" height="8" rx="4" fill="#E5E7EB"/>
  </g>
</svg>
